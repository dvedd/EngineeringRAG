x-airflow-common: &airflow-common
    build:
        context: .
        dockerfile: docker/AirFlow/Dockerfile
    image: ${AIRFLOW_IMAGE_NAME:-airflow-3.2_cuda-12.9_python-3.12:latest}
    env_file:
        - .env
    user: "${AIRFLOW_UID:-1000}:${AIRFLOW_GID:-1000}"
    environment: &airflow-common-env
        AIRFLOW__CORE__EXECUTOR: CeleryExecutor
        AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}
        AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
        AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
        AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
        AIRFLOW__CORE__FERNET_KEY: ""
        AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
        AIRFLOW_CONFIG: /opt/airflow/config/airflow.cfg
        AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
        PYTHONPATH: /opt/airflow/dags:/opt/airflow/plugins:/opt/airflow
        # AIRFLOW_CONN_MINIO: "aws://minioadmin:minioadmin@minio:9000?endpoint_url=http%3A%2F%2Fminio%3A9000"
        # AIRFLOW_CONN_QDRANT: "http://@qdrant:6333"
    volumes:
        - ./airflow/dags:/opt/airflow/dags
        - ./airflow/logs:/opt/airflow/logs
        - ./airflow/config:/opt/airflow/config
        - ./airflow/plugins:/opt/airflow/plugins
    depends_on: &airflow-common-depends-on
        postgres:
            condition: service_healthy
        redis:
            condition: service_healthy
        minio:
            condition: service_healthy

x-vllm-common: &vllm-common
    image: vllm/vllm-openai:v0.21.0
    ipc: host
    restart: always
    volumes:
        - ./data/huggingface_cache:/root/.cache/huggingface
    environment:
        HF_HOME: /root/.cache/huggingface
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      device_ids: ["0"]
                      capabilities: [gpu]

services:
    vllm-light:
        <<: *vllm-common
        container_name: vllm-light
        environment:
            HF_HOME: /root/.cache/huggingface
            HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
            VLLM_USE_V1: "0"
        command:
            - --model
            - ${LIGHT_MODEL:-Qwen/Qwen3-4B}
            - --mm-processor-cache-gb
            - "0.5"
            - --served-model-name
            - query-rewriter
            - --gpu-memory-utilization
            - "0.9"
            - --max-model-len
            - "2048"
            - --max-num-seqs
            - "4"
            # - --enable-sleep-mode
            - --enforce-eager
            - --reasoning-parser
            
            - qwen3
        ports:
            - "8020:8000"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 120s

    docling-serve:
        image: quay.io/docling-project/docling-serve-cu130:main
        container_name: docling-serve
        ports:
            - "5001:5001"
        environment:
            TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata/
            DOCLING_SERVE_ARTIFACTS_PATH: /models
            DOCLING_SERVE_ENABLE_UI: "true"
            DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "2"
            # DOCLING_SERVE_MAX_SYNC_WAIT: "600"
            UVICORN_WORKERS: "1"
        volumes:
            - /home/dved/EngineeringRAG/data/docling_models:/models
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["0"]
                          capabilities: [gpu]
        restart: always
        depends_on:
            <<: *airflow-common-depends-on

    mineru-api:
        image: dvmed/mineru:v3.0.9
        container_name: mineru-api
        restart: always
        ports:
            - 8000:8000
        environment:
            MINERU_MODEL_SOURCE: local
        entrypoint: mineru-api
        command: --host 0.0.0.0 --port 8000
        ulimits:
            memlock: -1
            stack: 67108864
        ipc: host
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:8000/docs"]
        depends_on:
            <<: *airflow-common-depends-on
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["0"]
                          capabilities: [gpu]

    qdrant:
        image: qdrant/qdrant:latest
        container_name: qdrant
        environment:
            - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=512
            - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
        deploy:
            resources:
                limits:
                    memory: 6G
        restart: always
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant-storage:/qdrant/storage

    minio:
        image: minio/minio:latest
        container_name: minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - ./data/minio:/data
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 10s
            retries: 5

    superset-db:
        image: postgres:16
        environment:
            POSTGRES_USER: superset
            POSTGRES_PASSWORD: superset
            POSTGRES_DB: superset
        volumes:
            - superset-db-volume:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "superset"]
            interval: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    superset:
        image: apache/superset:6.1.0rc2-py312
        ports:
            - "5054:8088"
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-revti-etl-superset-secret-change-me}
            SUPERSET_LOAD_EXAMPLES: "no"
        depends_on:
            superset-db:
                condition: service_healthy
        restart: unless-stopped
        volumes:
            - superset-home:/app/superset_home

    postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: airflow
            POSTGRES_PASSWORD: airflow
            POSTGRES_DB: airflow
        volumes:
            - postgres-db-volume:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "airflow"]
            interval: 10s
            retries: 5
        restart: always

    redis:
        image: redis:7.2-bookworm
        expose:
            - 6379
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 30s
            retries: 50
        restart: always

    airflow-init:
        <<: *airflow-common
        volumes:
            - ./airflow/dags:/opt/airflow/dags
            - ./airflow/logs:/opt/airflow/logs
            - ./airflow/plugins:/opt/airflow/plugins
            - ./airflow/config:/opt/airflow/config
            - /usr/local/cuda/lib64:/usr/local/cuda/lib64:ro
            - ./data/fastembed_cache:/opt/airflow/cache/fastembed
            - ./data/huggingface_cache:/opt/airflow/cache/huggingface
            - ./data/cache_airflow:/opt/airflow/cache
        environment:
            <<: *airflow-common-env
            AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
            AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
            AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
        container_name: airflow-init
        entrypoint: /bin/bash
        command:
            - -c
            - |
                airflow db migrate && \
                airflow users create \
                  --username admin \
                  --password admin \
                  --firstname Admin \
                  --lastname User \
                  --role Admin \
                  --email admin@example.com || true
                airflow connections import /opt/airflow/config/connections.yaml
        restart: "no"
        depends_on:
            <<: *airflow-common-depends-on

    airflow-apiserver:
        <<: *airflow-common
        container_name: airflow-apiserver
        command: api-server
        ports:
            - "8080:8080"
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "--fail",
                    "http://localhost:8080/api/v2/version",
                ]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    airflow-scheduler:
        <<: *airflow-common
        container_name: airflow-scheduler
        command: scheduler
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    airflow-dag-processor:
        <<: *airflow-common
        container_name: airflow-dag-processor
        command: dag-processor
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"',
                ]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    airflow-worker:
        <<: *airflow-common
        container_name: airflow-worker
        command: celery worker
        hostname: airflow-worker
        ports:
            - "8793:8793"
        volumes:
            - ./airflow/dags:/opt/airflow/dags
            - ./airflow/logs:/opt/airflow/logs
            - ./airflow/plugins:/opt/airflow/plugins
            - ./airflow/config:/opt/airflow/config
            - /usr/local/cuda/lib64:/usr/local/cuda/lib64:ro
            - ./data/fastembed_cache:/opt/airflow/cache/fastembed
            - ./data/huggingface_cache:/opt/airflow/cache/huggingface
            - ./data/cache_airflow:/opt/airflow/cache
        environment:
            <<: *airflow-common-env
            DUMB_INIT_SETSID: "0"
            NVIDIA_VISIBLE_DEVICES: "all"
            NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
            LD_LIBRARY_PATH: "/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu"
            HF_HOME: /opt/airflow/cache/huggingface
            FASTEMBED_CACHE_PATH: /opt/airflow/cache/fastembed
            AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
            AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
            AIRFLOW__CORE__BASE_LOG_FOLDER: /opt/airflow/logs
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
        healthcheck:
            test:
                - "CMD-SHELL"
                - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    airflow-triggerer:
        <<: *airflow-common
        container_name: airflow-triggerer
        command: triggerer
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"',
                ]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    flower:
        <<: *airflow-common
        container_name: airflow-flower
        command: celery flower
        ports:
            - "5555:5555"
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

    warehouse-postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: ${WAREHOUSE_PG_USER:-postgres}
            POSTGRES_PASSWORD: ${WAREHOUSE_PG_PASSWORD:-postgres}
            POSTGRES_DB: ${WAREHOUSE_PG_DB:-warehouse}
        ports:
            - "5052:5432"
        volumes:
            - postgres-warehouse-volume:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "postgres"]
            interval: 5s
            retries: 5
        restart: unless-stopped

    client-postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: ${CLIENT_PG_USER:-postgres}
            POSTGRES_PASSWORD: ${CLIENT_PG_PASSWORD:-postgres}
            POSTGRES_DB: ${CLIENT_PG_DB:-postgres}
        ports:
            - "5051:5432"
        volumes:
            - ./client-postgres-init:/docker-entrypoint-initdb.d

    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
        ports:
            - "5050:80"
        restart: unless-stopped

volumes:
    airflow-db-volume:
    superset-home:
    superset-db-volume:
    postgres-warehouse-volume:
    qdrant-storage:
    postgres-db-volume:
